<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>A-TYPE 퍼걸러 AR 쇼룸</title>
  <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/3.4.0/model-viewer.min.js"></script>
  <style>
    body { margin: 0; padding: 0; background-color: #f0f0f0; }
    model-viewer { width: 100%; height: 100vh; }
  </style>
</head>
<body>

  <!-- 띄어쓰기를 없앤 깔끔한 파일명으로 수정했습니다! -->
  <model-viewer 
    src="ATYPE.glb" 
    ios-src="A-2.usdz" 
    ar 
    camera-controls
    auto-rotate>
    
    <button slot="ar-button" style="position: absolute; bottom: 40px; left: 50%; transform: translateX(-50%); padding: 15px 30px; font-size: 18px; font-weight: bold; background-color: #007AFF; color: white; border: none; border-radius: 15px; box-shadow: 0 4px 6px rgba(0,0,0,0.2);">
      📷 주변 배경에 퍼걸러 배치하기
    </button>
  </model-viewer>

</body>
</html>
